spring:
  config:
    activate:
      on-profile: prod

server:
  port: 80
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    accept-count: 100

logging:
  level:
    root: WARN
    com.mipt.mvpmts2: INFO
    org.springframework: WARN
  
  spring:
    web:
      debug: false

app:
  environment: production
  debug-mode: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized